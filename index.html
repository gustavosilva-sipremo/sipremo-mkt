<!doctype html>
<html lang="pt-BR">
  <head>
    <!-- Charset -->
    <meta charset="UTF-8" />

    <!-- Responsividade -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO básico -->
    <meta
      name="description"
      content="Sipremo - Plataforma de inteligência climática e alertas antecipados em tempo real."
    />

    <!-- Theme color (mobile browsers) -->
    <meta name="theme-color" content="#000000" />

    <!-- Favicon (com fallback + versões) -->
    <link rel="icon" href="/favicons/sipremo.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/favicons/sipremo.png" />
    <link rel="apple-touch-icon" href="/favicons/sipremo.png" />

    <!-- Preload favicon (ajuda a carregar mais rápido) -->
    <link rel="preload" href="/favicons/sipremo.ico" as="image" />

    <!-- Cache busting (evita favicon antigo preso) -->
    <link rel="icon" href="/favicons/sipremo.ico?v=2" />

    <!-- Title -->
    <title>Sipremo</title>
  </head>

  <body>
    <div id="root"></div>

    <!-- Script principal -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
